<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Lịch Làm Việc Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bep: #4472c4; --pv: #70ad47; --time: #d63031; --off: #ff0000; }
        
        /* Tối ưu nền tảng di động */
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 100%; margin: auto; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* Toolbar hàng dọc trên mobile để dễ nhấn */
        .toolbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; background: #f8f9fa; padding: 12px; border-radius: 8px; }
        .toolbar-top { display: flex; justify-content: space-between; align-items: center; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; text-align: center; flex: 1; }
        .btn-zalo { background: #0068ff; width: 100%; margin-top: 5px; }
        .btn-save { background: #2d3436; padding: 8px 15px; }
        
        /* Khu vực nhập nhanh tối ưu cho ngón tay */
        .quick-fill { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; background: #e9ecef; padding: 12px; border-radius: 8px; }
        .quick-fill input, .quick-fill select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn-add { grid-column: span 2; background: #9b59b6; }

        /* Bảng có thanh cuộn ngang mượt mà */
        .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #ccc; border-radius: 5px; position: relative; }
        table { width: 900px; border-collapse: collapse; background: white; table-layout: fixed; }
        
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; vertical-align: top; }
        thead th { background: #34495e; color: white; padding: 10px; font-size: 12px; position: sticky; top: 0; }
        
        .group-header { background: #f1f2f6; font-weight: bold; text-align: left; padding: 10px; font-size: 14px; border-left: 5px solid #2c3e50; }
        .dept-col { font-weight: bold; background: #f9f9f9 !important; width: 70px; vertical-align: middle; position: sticky; left: 0; z-index: 2; }
        
        /* Ô lịch to hơn trên mobile */
        .cell-box { display: flex; flex-direction: column; gap: 4px; min-height: 90px; justify-content: center; }
        input { border: none; text-align: center; background: transparent; width: 100%; outline: none; font-size: 14px; }
        .edit-name { font-weight: bold; }
        .edit-time { color: var(--time); font-size: 12px; }
        .replace-in { border: 1px dashed #fff; background: rgba(255,255,255,0.4); color: white; font-size: 11px; display: none; padding: 2px; border-radius: 3px; }
        
        .btn-off { font-size: 11px; background: white; border: 1px solid #ccc; cursor: pointer; padding: 6px 0; width: 100%; border-radius: 4px; font-weight: bold; margin-top: 4px; }
        .is-off { background-color: var(--off) !important; }
        .is-off .edit-name, .is-off .edit-time { color: white !important; text-decoration: line-through; }
        .is-off .replace-in { display: block; }
        
        .btn-del { background: #ff7675; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 10px; margin-bottom: 5px; }

        /* Chụp ảnh không bị mất chữ */
        .temp-txt { display: block; width: 100%; text-align: center; font-size: 13px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <div class="toolbar-top">
            <input type="date" id="startDate" style="padding:8px; border-radius:5px; border:1px solid #ccc;" onchange="updateDates(); saveToDevice();">
            <button class="btn btn-save" onclick="saveToDevice()">LƯU LẠI</button>
        </div>
        <button class="btn btn-zalo" onclick="exportImage()">📸 CHỤP FULL GỬI ZALO (XEM LIỀN)</button>
    </div>

    <div class="quick-fill">
        <select id="targetD"><option value="bepB">Bếp</option><option value="pvB">Phục Vụ</option></select>
        <input type="text" id="qN" placeholder="Tên NV">
        <input type="text" id="qT" placeholder="Giờ (VD: 9-18h)">
        <button class="btn btn-add" onclick="quickAdd()">+ THÊM VÀO BẢNG</button>
    </div>

    <div class="table-wrapper">
        <div id="captureArea" style="background:white; padding:5px;">
            <table id="mainTable">
                <thead><tr id="dateRow"><th>Bộ phận</th></tr><tr style="background:#eee; font-size:12px;"><td>Thứ</td><td>T2</td><td>T3</td><td>T4</td><td>T5</td><td>T6</td><td>T7</td><td>CN</td></tr></thead>
                <tbody id="bepB"><tr><td colspan="8" class="group-header" style="color:var(--bep)">KHỐI BẾP</td></tr></tbody>
                <tbody id="pvB"><tr><td colspan="8" class="group-header" style="color:var(--pv)">KHỐI PHỤC VỤ</td></tr></tbody>
            </table>
        </div>
    </div>
    <p style="font-size: 11px; color: #777; text-align: center; margin-top: 10px;">* Vuốt ngang để xem hết các thứ trong tuần</p>
</div>

<script>
    // TỰ ĐỘNG LƯU VÀ TẢI DỮ LIỆU
    function saveToDevice() {
        const data = { date: document.getElementById('startDate').value, bep: getD('bepB'), pv: getD('pvB') };
        localStorage.setItem('work_data_v2', JSON.stringify(data));
    }

    function getD(id) {
        return Array.from(document.querySelectorAll(`#${id} tr:not(:first-child)`)).map(tr => ({
            lbl: tr.querySelector('.dept-col-name').innerText,
            days: Array.from(tr.querySelectorAll('td:not(.dept-col)')).map(td => ({
                n: td.querySelector('.edit-name').value, t: td.querySelector('.edit-time').value,
                r: td.querySelector('.replace-in').value, o: td.classList.contains('is-off')
            }))
        }));
    }

    function loadData() {
        const saved = localStorage.getItem('work_data_v2');
        if(!saved) { document.getElementById('startDate').value = "2026-03-02"; updateDates(); return; }
        const d = JSON.parse(saved); document.getElementById('startDate').value = d.date; updateDates();
        d.bep.forEach(r => renderRow('bepB', r)); d.pv.forEach(r => renderRow('pvB', r));
    }

    function renderRow(id, rD) {
        const tr = document.createElement('tr');
        let c = `<td class="dept-col"><button class="btn-del" onclick="if(confirm('Xóa?')) {this.closest('tr').remove(); saveToDevice();}">Xóa</button><div class="dept-col-name">${rD.lbl}</div></td>`;
        rD.days.forEach(day => {
            c += `<td class="${day.o?'is-off':''}"><div class="cell-box">
                <input type="text" class="edit-name" value="${day.n}" oninput="saveToDevice()">
                <input type="text" class="edit-time" value="${day.t}" oninput="saveToDevice()">
                <input type="text" class="replace-in" value="${day.r}" placeholder="Thay?" oninput="saveToDevice()">
                <button class="btn-off" onclick="toggleOff(this)">${day.o?'LÀM':'OFF'}</button>
            </div></td>`;
        });
        tr.innerHTML = c; document.getElementById(id).appendChild(tr);
    }

    function updateDates() {
        const val = document.getElementById('startDate').value;
        if(!val) return;
        const start = new Date(val);
        const row = document.getElementById('dateRow'); row.innerHTML = '<th>Bộ phận</th>';
        for(let i=0; i<7; i++) {
            let d = new Date(start); d.setDate(start.getDate() + i);
            row.innerHTML += `<th>${d.getDate()}/${d.getMonth()+1}</th>`;
        }
    }

    function quickAdd() {
        const n = document.getElementById('qN').value, t = document.getElementById('qT').value, d = document.getElementById('targetD').value;
        if(!n || !t) return alert("Nhập đủ tên và giờ!");
        renderRow(d, { lbl: d==='bepB'?'Bếp':'Phục Vụ', days: Array(7).fill({n:n, t:t, r:'', o:false}) });
        saveToDevice(); document.getElementById('qN').value=''; document.getElementById('qT').value='';
    }

    function toggleOff(btn) {
        const td = btn.closest('td'); td.classList.toggle('is-off');
        btn.innerText = td.classList.contains('is-off') ? 'LÀM' : 'OFF';
        saveToDevice();
    }

    // CHỤP ẢNH GỬI ZALO
    async function exportImage() {
        const area = document.getElementById('captureArea');
        const btns = area.querySelectorAll('button'); btns.forEach(b => b.style.display='none');
        const ins = area.querySelectorAll('input[type="text"]');
        const temps = [];
        ins.forEach(i => {
            const s = document.createElement('span'); s.innerText = i.value; s.className = i.className + " temp-txt";
            if(i.classList.contains('replace-in') && i.value === "") s.style.display = 'none';
            i.style.display='none'; i.parentNode.insertBefore(s, i); temps.push({s, i});
        });

        html2canvas(area, { scale: 2, backgroundColor: "#ffffff", useCORS: true }).then(canvas => {
            const link = document.createElement('a'); link.download = 'Lich_Zalo.png';
            link.href = canvas.toDataURL("image/png"); link.click();
            temps.forEach(t => { t.s.remove(); t.i.style.display='block'; });
            btns.forEach(b => b.style.display='inline-block');
            alert("Đã tải ảnh! Bạn vào Zalo gửi cho mọi người nhé.");
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
